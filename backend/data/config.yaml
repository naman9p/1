# AI Candidate Recommendation Engine Configuration
# This file provides an alternative to environment variables

application:
  name: "AI Candidate Recommendation Engine"
  environment: "development"
  debug: true
  log_level: "INFO"

server:
  host: "0.0.0.0"
  port: 8000

models:
  embedding:
    primary: "BAAI/bge-large-en-v1.5"
    fallback: "all-MiniLM-L6-v2"
  cross_encoder: "cross-encoder/ms-marco-MiniLM-L-6-v2"

vector_store:
  path: "./data/chroma_db"
  collection: "candidates"

scoring:
  weights:
    semantic: 0.40
    skill: 0.20
    experience: 0.10
    behavior: 0.10
    industry: 0.10
    education: 0.05
    bonus: 0.05

retrieval:
  top_k: 300
  rerank_top_k: 100
  final_output_k: 100

data:
  directory: "./data"
  candidates_file: "./data/candidates.jsonl"
  job_description_file: "./data/job_description.txt"
  output_file: "./output/recommendations.csv"

performance:
  max_workers: 4
  batch_size: 32
  cache_embeddings: true
